name: Feature Request
description: Suggest an improvement or new capability for the project.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: feature
    attributes:
      label: Feature description
      description: Describe the feature or improvement you would like to see.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Use case / motivation
      description: Explain why this feature would be useful and what problem it would solve.
    validations:
      required: true

  - type: textarea
    id: approach
    attributes:
      label: Proposed approach
      description: If you have an implementation idea, share it here.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternatives or workarounds you considered.
    validations:
      required: false
