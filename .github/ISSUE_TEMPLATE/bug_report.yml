name: Bug Report
description: Report a bug or regression in the simulator, engine, or tooling.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Summarize the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Describe what actually happened.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide the environment details used when the issue occurred.
      placeholder: |
        OS:
        Apple Silicon model:
        Mojo version:
        pixi version:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Screenshots/logs
      description: Add screenshots, stack traces, console output, or any other helpful context.
    validations:
      required: false
