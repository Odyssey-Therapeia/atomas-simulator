[workspace]
authors = ["Odyssey Therapeia"]
channels = ["https://conda.modular.com/max", "conda-forge"]
name = "nucleo"
# TODO: Add linux-64 and osx-64 once cross-platform CI verifies the lockfile.
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
build = "mojo build -I src src/main.mojo -o nucleo"
run = "mojo run -I src src/main.mojo"
test-game-state = "mojo run -I src tests/test_game_state.mojo"
test-ring = "mojo run -I src tests/test_ring.mojo"
test-scoring = "mojo run -I src tests/test_scoring.mojo"
test-fusion = "mojo run -I src tests/test_fusion.mojo"
test-spawn = "mojo run -I src tests/test_spawn.mojo"
test-actions = "mojo run -I src tests/test_actions.mojo"
test-integration = "mojo run -I src tests/test_integration.mojo"
test-stress = "mojo run -I src tests/test_stress.mojo"
test-determinism = "mojo run -I src tests/test_determinism.mojo"
test-rl-modules = "mojo run -I src -I rl tests/test_rl_modules.mojo"
test-web-smoke = { cmd = ["bash", "-lc", "\".pixi/envs/default/bin/python\" \"tests/test_web_smoke.py\""] }
test-rl-smoke = { cmd = ["bash", "-lc", "\".pixi/envs/default/bin/python\" \"tests/test_rl_smoke.py\""] }
test-real-atomas = { cmd = ["bash", "-lc", "\".pixi/envs/default/bin/python\" \"tests/test_real_atomas_parsers.py\""] }
bench-throughput = "mojo run -I src -I bench bench/bench_throughput.mojo"
bench-allocation = "mojo run -I src -I bench bench/bench_allocation.mojo"
bench-fork = "mojo run -I src -I bench bench/bench_fork.mojo"
bench-python = { cmd = ["bash", "-lc", "\".pixi/envs/default/bin/python\" \"bench/bench_python.py\""] }
generate-sequences = { cmd = ["bash", "-lc", "\".pixi/envs/default/bin/python\" \"bench/generate_sequences.py\""] }
verify-cross = { cmd = ["bash", "-lc", "\".pixi/envs/default/bin/python\" \"bench/verify_cross_validation.py\""] }
test = { depends-on = [
    "test-game-state",
    "test-ring",
    "test-scoring",
    "test-fusion",
    "test-spawn",
    "test-actions",
    "test-integration",
    "test-rl-modules",
    "test-web-smoke",
    "test-rl-smoke",
    "test-real-atomas",
] }
test-all = { depends-on = [
    "test",
    "test-stress",
    "test-determinism",
] }
bench-all = { cmd = ["bash", "-lc", "\".pixi/envs/default/bin/python\" \"bench/generate_sequences.py\" && \".pixi/envs/default/bin/mojo\" run -I src -I bench bench/bench_throughput.mojo && \".pixi/envs/default/bin/mojo\" run -I src -I bench bench/bench_allocation.mojo && \".pixi/envs/default/bin/mojo\" run -I src -I bench bench/bench_fork.mojo && \".pixi/envs/default/bin/python\" \"bench/bench_python.py\" && \".pixi/envs/default/bin/python\" \"bench/verify_cross_validation.py\""] }
format = "mojo format src/ tests/ bench/"
serve = "python -m uvicorn web.server:app --reload --port 8080"

[dependencies]
mojo = ">=0.26.2,<0.27"
python = "3.11.*"
fastapi = ">=0.135.1,<0.136"
uvicorn = ">=0.42.0,<0.43"
httpx = ">=0.28.1,<0.29"
numpy = ">=2.4.3,<3"
gymnasium = ">=1.2.3,<2"
